services:
  neo4j:
    image: neo4j:5
    container_name: pfn-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: pfn-api
    ports:
      - "3000:3000"
    env_file:
      - ./Backend/.env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      PORT: "3000"
    depends_on:
      neo4j:
        condition: service_healthy
    restart: on-failure

volumes:
  neo4j_data:
